name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, synchronize, closed]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: Check contributor license agreement
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          github.event_name == 'pull_request_target' ||
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/cla/v1.json
          path-to-document: https://github.com/imsawiq/Rinthy/blob/main/CLA.md
          branch: main
          allowlist: imsawiq,dependabot[bot],github-actions[bot],renovate[bot]
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-notsigned-prcomment: >-
            Thanks for the contribution. Before this pull request can be merged,
            please read the Rinthy CLA and comment exactly:
            I have read the CLA Document and I hereby sign the CLA
          custom-allsigned-prcomment: All contributors have signed the Rinthy CLA.
          lock-pullrequest-aftermerge: false
